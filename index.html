<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tiyu Salon Tokyo Lookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Questrial&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='serif'>T</text></svg>" />
</head>
<body>

  <div id="app">
    <div id="screen-container">
      <div id="screen-home" class="screen active"></div>
      <div id="screen-search" class="screen"></div>
      <div id="screen-upload" class="screen"></div>
      <div id="screen-collection" class="screen"></div>
      <div id="detail-view" class="detail-view"></div>
      <div id="estimator-view" class="detail-view"></div>
      <div id="policy-view" class="detail-view"></div>
      <div id="canvas-view" class="detail-view"></div>
    </div>
    <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">
      <span class="lang-en">EN</span>
      <span class="lang-sep">/</span>
      <span class="lang-ja">日本語</span>
    </button>
    <nav id="bottom-nav">
      <button data-screen="home" class="nav-btn active" aria-label="Gallery">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Gallery</span>
      </button>
      <button data-screen="search" class="nav-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </button>
      <button data-screen="upload" class="nav-btn" aria-label="Inspo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Inspo</span>
      </button>
      <button data-screen="collection" class="nav-btn" aria-label="Wishlist">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Wishlist</span>
      </button>
    </nav>
    <div id="toast" class="toast hidden"></div>
    <div id="booking-modal" class="booking-modal">
      <div class="booking-modal-content" id="booking-modal-content"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
