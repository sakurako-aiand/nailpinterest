<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Board — Drag & Drop Look Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Questrial&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/moodboard.css" />
</head>
<body>

  <div class="app-shell">

    <!-- ── LEFT COLUMN: Inspiration Gallery ── -->
    <section class="gallery-column">
      <header class="gallery-header">
        <div>
          <h1>Inspiration Gallery</h1>
          <p>Drag any image to the right board</p>
        </div>
        <label class="upload-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span>Upload Image</span>
          <input type="file" id="file-input" accept="image/*" multiple hidden />
        </label>
      </header>
      <div class="masonry" id="gallery-masonry"></div>
    </section>

    <!-- ── RIGHT COLUMN: Final Look Board ── -->
    <section class="board-column">
      <header class="board-header">
        <h1>Final Look Board</h1>
        <p>Drop images here to build your look</p>
        <button class="clear-btn" id="clear-board">Clear All</button>
      </header>
      <div class="board-grid" id="board-grid"></div>
    </section>

  </div>

  <script src="js/moodboard.js"></script>
</body>
</html>
